kind = "web"
previewPath = "/"
title = "Tokyo Properties"
version = "1.0.0"
id = "artifacts/japan-invest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22743

[services.development]
run = "pnpm --filter @workspace/japan-invest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/japan-invest", "run", "build" ]
publicDir = "artifacts/japan-invest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22743"
BASE_PATH = "/"
