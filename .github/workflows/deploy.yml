name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'artifacts/japan-invest/**'
      - '.github/workflows/deploy.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build japan-invest
        run: pnpm --filter @workspace/japan-invest build
        env:
          PORT: 5173
          BASE_PATH: /TokyoProperty

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/japan-invest/dist/public

      - uses: actions/deploy-pages@v4
